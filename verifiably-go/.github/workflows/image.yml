name: image

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'backend/**'
      - 'internal/**'
      - 'vctypes/**'
      - 'templates/**'
      - 'static/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/image.yml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'backend/**'
      - 'internal/**'
      - 'vctypes/**'
      - 'Dockerfile'

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: verifiably-go

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # for cosign keyless signing in Phase 7.2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY,,}/${IMAGE_NAME}:$SHA" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "latest=${REGISTRY,,}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.tags.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan (sources)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          scanners: vuln,secret,misconfig

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.tags.outputs.ref }}
          severity: HIGH,CRITICAL
          exit-code: '0'   # report-only on the built image; tighten in Phase 7.2
          ignore-unfixed: true

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker push ${{ steps.tags.outputs.ref }}
          docker tag ${{ steps.tags.outputs.ref }} ${{ steps.tags.outputs.latest }}
          docker push ${{ steps.tags.outputs.latest }}

      # Cosign keyless signing — Phase 7.2 wires Kyverno enforcement.
      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: cosign sign --yes ${{ steps.tags.outputs.ref }}
