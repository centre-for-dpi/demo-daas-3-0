name: k8s-e2e

on:
  pull_request:
    paths:
      - 'deploy/k8s/**'
      - 'cmd/**'
      - 'backend/**'
      - 'internal/**'
      - 'e2e/**'
      - '.github/workflows/k8s-e2e.yml'

jobs:
  kind-up-test-down:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install kind, kubectl, helm, terraform
        run: |
          curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x /tmp/kind && sudo mv /tmp/kind /usr/local/bin/
          sudo apt-get update && sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://baltocdn.com/helm/signing.asc | sudo gpg --dearmor -o /usr/share/keyrings/helm.gpg
          echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y kubectl helm terraform

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Bring up cluster + waltid stack
        timeout-minutes: 18
        run: |
          ./deploy/k8s/scripts/k8s-deploy.sh up waltid --target=local

      - name: Run e2e smoke set
        timeout-minutes: 5
        run: |
          ./deploy/k8s/test/e2e/run-against-cluster.sh

      - name: Tear down
        if: always()
        run: |
          ./deploy/k8s/scripts/k8s-deploy.sh reset --target=local || true
