# Use Docker's embedded DNS (127.0.0.11) for upstream resolution at
# request time, with a 10s TTL and IPv4 answers only. Without this,
# nginx resolves `mimoto-service` once at worker startup and caches
# the IP — which breaks every time Mimoto restarts and gets a new IP
# on the waltid_default network. The `set $mimoto ...; proxy_pass
# http://$mimoto;` pattern forces per-request DNS lookups using the
# resolver above.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 3004;
    # Serve static files, if any
    # Default location for normal static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Serve files from /home/mosip with autoindex enabled
    location ~* \.json$ {
        root /home/mosip;
        autoindex on;
    }

  # Serve any HTML file ending with -template.html from /home/mosip and return 404 if not found
    location ~* /.*-template\.html$ {
          root /home/mosip;  # Serve from /home/mosip specifically for files matching *-template.html
          try_files $uri =404;  # Check if file exists, return 404 if not
    }
    # Proxy API requests to mimoto-service. Using a variable in
    # proxy_pass forces nginx to re-resolve the upstream on every
    # request instead of caching a single IP at startup.
    # GOTCHA: when proxy_pass uses a variable, nginx does NOT strip
    # the matched location prefix — the FULL request URI gets
    # appended to the target. So we pass only host:port (no path)
    # and let nginx forward /v1/mimoto/... through verbatim.
    location /v1/mimoto/ {
        set $mimoto_upstream mimoto-service:8099;
        proxy_pass http://$mimoto_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Add CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Cache-Control' always;

        # Handle OPTIONS requests (for pre-flight checks)
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
