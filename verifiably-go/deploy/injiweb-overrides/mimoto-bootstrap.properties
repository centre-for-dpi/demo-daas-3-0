# Patched bootstrap for injiweb-mimoto.
#
# Root cause: the upstream mimoto-bootstrap.properties points
# spring.cloud.config.uri at http://inji-web:3004/ — but inji-web's nginx
# serves a React SPA there, not a Spring Cloud Config server. Spring fetches
# the config document on startup, gets back HTML, fails to parse, and aborts
# with exit code 1 before Logback even initialises. That's why mimoto
# crash-loops (489+ restarts in a sitting).
#
# Two things have to work together to fix it:
#   1. spring.cloud.config.enabled=false  — don't try to fetch from the bad
#      server. Mimoto's actual config is bind-mounted locally at
#      /home/mosip/mimoto-default.properties and SPRING_CONFIG_LOCATION
#      already points at it.
#   2. KEEP openapi.group.* in this bootstrap file. Mimoto's SwaggerConfig
#      bean depends on OpenApiProperties.getGroup(); if it's null the bean
#      factory NPE's and startup fails a different way. The upstream
#      bootstrap had those props inline so we preserve them here.

spring.cloud.config.enabled=false
spring.cloud.config.name=mimoto,inji
spring.application.name=mimoto

# Mimoto's REST client pulls the issuer catalog + credential templates from
# this URL. inji-web DOES serve those via its nginx (*.json + *-template.html
# routes), so this one's kept.
config.server.file.storage.uri=http://inji-web:3004/

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=info,health,refresh

server.port=8099
server.servlet.context-path=/v1/mimoto
server.tomcat.max-http-response-header-size=65536

health.config.enabled=false

openapi.info.title=${spring.application.name}
openapi.info.description=${spring.application.name}
openapi.info.version=1.0
openapi.info.license.name=Mosip
openapi.info.license.url=https://docs.mosip.io/platform/license
openapi.service.servers[0].url=${mosip.api.public.url}${server.servlet.context-path}
openapi.service.servers[0].description=${spring.application.name}
openapi.group.name=${openapi.info.title}
openapi.group.paths[0]=/**
