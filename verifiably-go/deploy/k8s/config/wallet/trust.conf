# Trust registry — issuer and verifier governance lists.
#
# Security finding (Phase 0): the upstream demo ships placeholder strings
# (`<url>`, `<path>`) which silently disable the feature but make the
# disabled state non-obvious. Empty strings here make it explicit. To
# enable, populate via WALLET_TRUST_* env vars in your deployment.
issuersRecord: {
    baseUrl              = "${WALLET_TRUST_ISSUERS_BASE_URL}"
    trustRecordPath      = "${WALLET_TRUST_ISSUERS_TRUST_PATH}"
    governanceRecordPath = "${WALLET_TRUST_ISSUERS_GOVERNANCE_PATH}"
}
verifiersRecord: {
    baseUrl              = "${WALLET_TRUST_VERIFIERS_BASE_URL}"
    trustRecordPath      = "${WALLET_TRUST_VERIFIERS_TRUST_PATH}"
    governanceRecordPath = "${WALLET_TRUST_VERIFIERS_GOVERNANCE_PATH}"
}
