# OIDC login for the Web Wallet (NOT credential exchange).
#
# Disabled by default in logins.conf — leaving this file in place so that
# the file map matches the upstream walt.id wallet-api expectation, but
# every value is now env-driven so the chart's values.yaml can flip on
# OIDC login by setting the WALLET_OIDC_* vars and re-adding "oidc" to
# enabledLoginMethods.

publicBaseUrl = "${WALLET_OIDC_PUBLIC_BASE_URL}"

providerName = "${WALLET_OIDC_PROVIDER_NAME}"
oidcRealm    = "${WALLET_OIDC_REALM_URL}"
oidcJwks     = ${oidcRealm}"/protocol/openid-connect/certs"
oidcScopes   = ["roles"]

authorizeUrl   = ${oidcRealm}"/protocol/openid-connect/auth"
accessTokenUrl = ${oidcRealm}"/protocol/openid-connect/token"
logoutUrl      = ${oidcRealm}"/protocol/openid-connect/logout"

clientId     = "${WALLET_OIDC_CLIENT_ID}"
clientSecret = "${WALLET_OIDC_CLIENT_SECRET}"

keycloakUserApi = ${oidcRealm}"/users"

jwksCache = {
    cacheSize = 10
    cacheExpirationHours = 24
    rateLimit: {
        bucketSize: 10
        refillRateMinutes: 1
    }
}
