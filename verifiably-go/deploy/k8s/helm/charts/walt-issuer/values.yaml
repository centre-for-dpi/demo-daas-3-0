# Schema mirrors docs/k8s/values-schema.md (issuer-api section).
issuer:
  image:
    repository: waltid/issuer-api
    tag: "0.18.2"
    pullPolicy: IfNotPresent
  service:
    port: 7002

  # Public ingress URL — required (e.g. https://issuer.example.com).
  baseUrl: ""

  # Hostname-only form used by Ingress; falls back to a deduction from
  # baseUrl when empty.
  ingress:
    enabled: true
    className: nginx
    host: ""
    annotations:
      cert-manager.io/cluster-issuer: selfsigned
    tls: true

  replicas: 2
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { memory: 512Mi }

  # Probes hit walt.id's healthz/livez when present; otherwise root TCP.
  livenessProbe:
    httpGet: { path: /swagger/index.html, port: http }
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet: { path: /swagger/index.html, port: http }
    initialDelaySeconds: 10
    periodSeconds: 5

  # External Secret name carrying issuer signing keys (Phase 7.1).
  signingKey:
    existingSecret: ""

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile: { type: RuntimeDefault }

  containerSecurityContext:
    readOnlyRootFilesystem: false   # walt.id writes ~/.walt/keystore at runtime
    allowPrivilegeEscalation: false
    capabilities: { drop: ["ALL"] }

  serviceAccount:
    create: true
    automountServiceAccountToken: false

  serviceMonitor:
    enabled: false                   # Phase 6.1 wires actual scraping
    path: /metrics
    interval: 30s

  # NetworkPolicy — default-deny ingress, allow only from ingress-nginx and
  # the verifiably-go pod.
  networkPolicy:
    enabled: true
    allowFrom:
      - namespaceSelector:
          matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
      - podSelector:
          matchLabels: { app.kubernetes.io/name: verifiably-go }

global:
  domain: ""
  clusterIssuer: selfsigned
