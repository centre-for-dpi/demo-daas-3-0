{{- if .Values.issuer.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "walt-issuer.fullname" . }}
  labels: {{- include "walt-issuer.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "walt-issuer.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        {{- toYaml .Values.issuer.networkPolicy.allowFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.issuer.service.port }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound HTTPS — DPG calls, OCSP/CRL, OIDC discovery, etc.
    - to: [{ ipBlock: { cidr: 0.0.0.0/0 } }]
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
