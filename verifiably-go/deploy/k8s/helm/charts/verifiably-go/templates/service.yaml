apiVersion: v1
kind: Service
metadata:
  name: {{ include "verifiably-go.fullname" . }}
  labels: {{- include "verifiably-go.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "verifiably-go.selectorLabels" . | nindent 4 }}
