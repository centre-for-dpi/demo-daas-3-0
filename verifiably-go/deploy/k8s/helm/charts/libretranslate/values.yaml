libretranslate:
  image:
    repository: libretranslate/libretranslate
    tag: "v1.6.5"
    pullPolicy: IfNotPresent
  service:
    port: 5000
  loadOnly: "en,es,fr"

  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { memory: 1Gi }

  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce

  livenessProbe:
    httpGet: { path: /, port: http }
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /languages, port: http }
    initialDelaySeconds: 30
    periodSeconds: 10

  # In-cluster only by default — verifiably-go reaches it via ClusterIP.
  ingress:
    enabled: false

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile: { type: RuntimeDefault }
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities: { drop: ["ALL"] }

  serviceAccount:
    create: true
    automountServiceAccountToken: false

global:
  domain: ""
