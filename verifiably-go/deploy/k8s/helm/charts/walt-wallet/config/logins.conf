# Wallet login methods.
#
# Security finding (Phase 0): the upstream demo enables `oidc`, but
# oidc.conf in the same directory ships with a non-existent realm URL
# and a placeholder client secret. Until OIDC is wired against a real
# IdP (Phase 4.5 keycloak chart + matching realm), `oidc` is removed
# from the default login methods.
enabledLoginMethods: [
    "email",
    "web3",
    "passkeys"
    # "oidc"  # OFF by default — see oidc.conf and re-enable when wired.
]
