# Walt.id wallet feature flags.
#
# Security finding (Phase 0): the upstream demo enables `dev-mode`, which
# loads `dev-mode.conf` and short-circuits various security checks. We
# default to no enabled features for prod-safety. To re-enable dev-mode
# for local development, override this file via your deployment's config
# layer (compose env, Helm values).
enabledFeatures = [
    # external-signature-endpoints,
    # trusted-ca,
    # entra,
    # ktor-authnz,
    # dev-mode  # OFF by default — re-enable explicitly in dev profiles only.
]
disabledFeatures = [
    # auth   # legacy auth
]
