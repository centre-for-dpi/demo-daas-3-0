apiVersion: v1
kind: Service
metadata:
  name: {{ include "walt-verifier.fullname" . }}
  labels: {{- include "walt-verifier.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.verifier.service.port }}
      targetPort: http
      protocol: TCP
  selector: {{- include "walt-verifier.selectorLabels" . | nindent 4 }}
