{{define "content_docs_view"}}
<section class="view active">
  <div class="section-label"><span class="num">📖</span><span class="caps">Docs · {{.Body.Entry.Category}}</span></div>
  <div style="margin-bottom:1rem"><a href="/docs" class="mono" style="font-size:0.78rem;color:var(--ink-mute)">← all docs</a></div>
  <div class="docs-body">
    {{.Body.HTML}}
  </div>
  <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid var(--line);font-size:0.75rem;color:var(--ink-mute)">
    Source: <span class="mono">{{.Body.Entry.Rel}}</span>
  </div>
</section>

<style>
  .docs-body { max-width: 52rem; line-height: 1.6; }
  .docs-body h1 { font-family: 'Josefin Sans', sans-serif; font-weight: 500; font-size: 2rem; margin: 1.5rem 0 1rem; }
  .docs-body h2 { font-family: 'Josefin Sans', sans-serif; font-weight: 500; font-size: 1.4rem; margin: 2rem 0 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--line); }
  .docs-body h3 { font-family: 'Josefin Sans', sans-serif; font-weight: 500; font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
  .docs-body h4 { font-weight: 600; margin: 1.25rem 0 0.4rem; }
  .docs-body p  { margin: 0.75rem 0; }
  .docs-body ul, .docs-body ol { margin: 0.75rem 0; padding-left: 1.5rem; }
  .docs-body li { margin: 0.2rem 0; }
  .docs-body code { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: var(--bg-elev); padding: 0.1rem 0.35rem; border-radius: 3px; }
  .docs-body pre { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 4px; padding: 0.85rem 1rem; overflow-x: auto; margin: 0.75rem 0; }
  .docs-body pre code { background: transparent; padding: 0; font-size: 0.8rem; line-height: 1.55; }
  .docs-body table { border-collapse: collapse; margin: 1rem 0; font-size: 0.88rem; width: 100%; }
  .docs-body th, .docs-body td { border: 1px solid var(--line); padding: 0.45rem 0.75rem; text-align: left; vertical-align: top; }
  .docs-body th { background: var(--bg-elev); font-weight: 600; }
  .docs-body blockquote { border-left: 3px solid var(--line); margin: 0.75rem 0; padding: 0.25rem 1rem; color: var(--ink-soft); background: var(--bg-elev); }
  .docs-body a { color: var(--accent, #5b8def); }
  .docs-body hr { border: none; border-top: 1px solid var(--line); margin: 2rem 0; }
  .docs-body img { max-width: 100%; height: auto; }
</style>
{{end}}
