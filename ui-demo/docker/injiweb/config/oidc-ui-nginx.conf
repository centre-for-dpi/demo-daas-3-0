worker_processes  1;

events {
  worker_connections  1024;
}

http {
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;
  # Docker embedded DNS, re-resolved on every request. Without this,
  # nginx caches the first-resolved IP of injiweb-esignet and breaks
  # when the container is recreated (common during env-var changes).
  resolver 127.0.0.11 valid=10s ipv6=off;
  server {
    listen 3000;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # All proxy_pass targets use a variable so nginx re-resolves
    # injiweb-esignet's IP on every request via the resolver above.
    # GOTCHA: when proxy_pass uses a variable, nginx does NOT strip
    # the matched location prefix — the FULL original request URI is
    # appended to the target. So we pass the upstream host:port only
    # (no path suffix) for the /v1/esignet block, and use `rewrite`
    # to remap the well-known paths which live at different URLs on
    # the backend.
    set $esignet_upstream injiweb-esignet:8088;

    location /v1/esignet {
      proxy_pass         http://$esignet_upstream;
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
    }
    location = /.well-known/openid-configuration {
      rewrite ^ /v1/esignet/oidc/.well-known/openid-configuration break;
      proxy_pass         http://$esignet_upstream;
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
    }
    location = /.well-known/jwks.json {
      rewrite ^ /v1/esignet/oauth/.well-known/jwks.json break;
      proxy_pass         http://$esignet_upstream;
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
    }
    location = /.well-known/oauth-authorization-server {
      rewrite ^ /v1/esignet/oauth/.well-known/oauth-authorization-server break;
      proxy_pass         http://$esignet_upstream;
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
    }
    location = /.well-known/openid-credential-issuer {
      rewrite ^ /v1/esignet/vci/.well-known/openid-credential-issuer break;
      proxy_pass         http://$esignet_upstream;
      proxy_redirect     off;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Host $server_name;
    }
    # location /oidc-ui {
    #   alias /usr/share/nginx/oidc-ui;
    #   try_files $uri $uri/ /oidc-ui/index.html;
    # }
    location / {
      # alias /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}