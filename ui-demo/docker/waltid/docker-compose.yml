services:
  postgres:
    image: postgres:latest
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-U", "${POSTGRES_USER:-waltid}"]
      interval: 5s
      timeout: 1s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waltid}
      POSTGRES_USER: ${POSTGRES_USER:-waltid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waltid}
    volumes:
      - wallet-db:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      WALLET_BACKEND_PORT: ${WALTID_WALLET_PORT:-7001}
      ISSUER_API_PORT: ${WALTID_ISSUER_PORT:-7002}
      VERIFIER_API_PORT: ${WALTID_VERIFIER_PORT:-7003}
    ports:
      - "${WALTID_WALLET_PORT:-7001}:${WALTID_WALLET_PORT:-7001}"
      - "${WALTID_ISSUER_PORT:-7002}:${WALTID_ISSUER_PORT:-7002}"
      - "${WALTID_VERIFIER_PORT:-7003}:${WALTID_VERIFIER_PORT:-7003}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

  issuer-api:
    image: waltid/issuer-api:latest
    depends_on:
      - caddy
    environment:
      SERVICE_HOST: localhost
      ISSUER_API_PORT: ${WALTID_ISSUER_PORT:-7002}
    volumes:
      - ./issuer-api/config:/waltid-issuer-api/config

  verifier-api:
    image: waltid/verifier-api:latest
    depends_on:
      - caddy
    environment:
      SERVICE_HOST: localhost
      VERIFIER_API_PORT: ${WALTID_VERIFIER_PORT:-7003}
    volumes:
      - ./verifier-api/config:/waltid-verifier-api/config

  wallet-api:
    image: waltid/wallet-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      caddy:
        condition: service_started
    environment:
      SERVICE_HOST: localhost
      WALLET_BACKEND_PORT: ${WALTID_WALLET_PORT:-7001}
      DB_NAME: ${POSTGRES_DB:-waltid}
      DB_USERNAME: ${POSTGRES_USER:-waltid}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-waltid}
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
    extra_hosts:
      - "localhost:host-gateway"
      - "host.docker.internal:host-gateway"
    volumes:
      - ./wallet-api/config:/waltid-wallet-api/config
      - ./wallet-api/data:/waltid-wallet-api/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: ${KEYCLOAK_PORT:-8180}
    command: start-dev --http-port=${KEYCLOAK_PORT:-8180} --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8180}:${KEYCLOAK_PORT:-8180}"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/vcplatform-realm.json

  wso2is:
    image: wso2/wso2is:7.0.0
    ports:
      - "${WSO2_PORT:-9443}:9443"
    environment:
      JAVA_OPTS: "-Xms512m -Xmx1024m"

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    environment:
      LT_LOAD_ONLY: "en,es,fr"
    volumes:
      - lt-data:/home/libretranslate/.local

  # ==========================================================================
  # Inji Certify — MOSIP's credential issuance service (OID4VCI)
  # See docker/waltid/inji/README.md for full setup documentation
  # ==========================================================================

  certify-postgres:
    image: postgres:15
    container_name: certify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./inji/certify/init.sql:/docker-entrypoint-initdb.d/certify_init.sql
      - certify-db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  inji-certify:
    image: injistack/inji-certify-with-plugins:0.14.0
    container_name: inji-certify
    user: root
    ports:
      - "8090:8090"
    environment:
      - container_user=mosip
      - active_profile_env=default,csvdp-farmer
      - SPRING_CONFIG_NAME=certify
      - SPRING_CONFIG_LOCATION=/home/mosip/config/
      - enable_certify_artifactory=false
      - download_hsm_client=false
      - mosip_certify_domain_url=http://certify-nginx:80
    volumes:
      - ./inji/certify/certify-default.properties:/home/mosip/config/certify-default.properties
      - ./inji/certify/certify-csvdp-farmer.properties:/home/mosip/config/certify-csvdp-farmer.properties
      - ./inji/certify/farmer_identity_data.csv:/home/mosip/config/farmer_identity_data.csv
      - ./inji/certify/vp_request_config.json:/home/mosip/config/vp_request_config.json
      - certify-pkcs12:/home/mosip/CERTIFY_PKCS12
    depends_on:
      certify-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/v1/certify/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10

  certify-nginx:
    image: nginx:stable
    container_name: certify-nginx
    ports:
      - "8091:80"
      - "8443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./inji/certify-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./inji/certify-nginx/certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro
      - ./inji/certify-nginx/certs/nginx.key:/etc/nginx/certs/nginx.key:ro
      - ./inji/certify-nginx/config/farmer-context.json:/config/server/farmer-context.json:ro
      - ./inji/certify-nginx/config/mimoto-issuers-config.json:/config/server/mimoto-issuers-config.json:ro
      - ./inji/certify-nginx/config/mimoto-trusted-verifiers.json:/config/server/mimoto-trusted-verifiers.json:ro
      - ./inji/certify-nginx/config/credential-template.html:/config/server/credential-template.html:ro
      - ./inji/certify-nginx/config/vp_request_config.json:/config/server/vp_request_config.json:ro
    depends_on:
      - inji-certify

  # ==========================================================================
  # Inji Verify — MOSIP's credential verification service (OID4VP)
  # ==========================================================================

  inji-verify-postgres:
    image: postgres:13
    container_name: inji-verify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inji_verify
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - inji-verify-db:/var/lib/postgresql/data

  inji-verify-service:
    image: mosipid/inji-verify-service:0.16.0
    container_name: inji-verify-service
    user: root
    ports:
      - "8082:8080"
    environment:
      - active_profile_env=default
      - DATABASE_HOST=inji-verify-postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=inji_verify
      - DATABASE_SCHEMA=verify
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    volumes:
      - ./inji/certify-nginx/certs/nginx.crt:/tmp/certify-nginx.crt:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        keytool -importcert -alias certify-nginx -file /tmp/certify-nginx.crt \
          -keystore $$JAVA_HOME/lib/security/cacerts -storepass changeit -noprompt 2>/dev/null || true
        exec java -jar /home/mosip/verify-service.jar
    depends_on:
      inji-verify-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/verify/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 10

  inji-verify-ui:
    image: mosipid/inji-verify-ui:0.16.0
    container_name: inji-verify-ui
    ports:
      - "3001:8000"
    environment:
      - DEFAULT_TITLE=Inji Verify
      - DEFAULT_LANG=en
      - VERIFIABLE_CLAIMS_CONFIG_URL=/assets/config.json
      - VP_SUBMISSION_SUPPORTED=false
      - DISPLAY_TIMEOUT=120000
    volumes:
      - ./inji/verify/verify-ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - inji-verify-service

  # ==========================================================================
  # Citizens database — mock government registry powering the data source
  # ==========================================================================

  citizens-postgres:
    image: postgres:16
    container_name: citizens-postgres
    environment:
      POSTGRES_USER: citizens
      POSTGRES_PASSWORD: citizens
      POSTGRES_DB: citizens
    ports:
      - "5435:5432"
    volumes:
      - ./citizens-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - citizens-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citizens"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Verification Adapter — backend-agnostic verifier
  #
  # Routes by DID method to inji-verify / waltid-verifier-api, or verifies
  # LDP_VC cryptographically in-process via URDNA2015 + Ed25519. SD-JWT
  # with x5c headers is also verified locally (self-contained cert chain).
  # Runs on the same waltid_default network as the rest of the stack so
  # backend URLs use internal docker hostnames.
  #
  # For true air-gap demonstration, run this service with
  #   docker run --rm --network none ... verification-adapter
  # after pre-syncing issuer keys via POST /sync.
  # ==========================================================================

  vc-adapter:
    image: verification-adapter-adapter:latest
    container_name: vc-adapter
    ports:
      - "8085:8085"
    environment:
      ADAPTER_PORT: "8085"
      BACKENDS_CONFIG: /app/backends.json
      CACHE_DB: /app/cache/issuer-cache.db
    volumes:
      - ./vc-adapter/backends.json:/app/backends.json:ro
      - vc-adapter-cache:/app/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  wallet-db:
  lt-data:
  certify-db:
  certify-pkcs12:
  inji-verify-db:
  citizens-data:
  vc-adapter-cache:
