{{define "content"}}
<div class="page" style="display:block;padding:2rem 2rem 4rem;max-width:1100px;animation:pageIn 0.3s ease-out">
  <div class="page-header"><h1>Issuer Intake Form</h1><p>Guided onboarding for new credential issuers. Complete all steps to submit for review.</p></div>
  <div class="wizard-steps">
    <div class="wizard-step active" onclick="activateStep(this)"><span class="wizard-step-num">1</span>Organization</div>
    <div class="wizard-step" onclick="activateStep(this)"><span class="wizard-step-num">2</span>Credentials</div>
    <div class="wizard-step" onclick="activateStep(this)"><span class="wizard-step-num">3</span>Technical</div>
    <div class="wizard-step" onclick="activateStep(this)"><span class="wizard-step-num">4</span>Review</div>
  </div>
  <div class="card">
    <div class="form-row" style="margin-bottom:0">
      <div class="form-group"><label class="form-label">Organization Name</label><input class="form-input" placeholder="Ministry of Health"></div>
      <div class="form-group"><label class="form-label">Sector</label><select class="form-select"><option>Government</option><option>Education</option><option>Healthcare</option><option>Financial</option><option>Agriculture</option><option>Other</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Contact Name</label><input class="form-input" placeholder="Dr. Anika Persad"></div>
      <div class="form-group"><label class="form-label">Contact Email</label><input class="form-input" placeholder="a.persad@health.gov.tt" type="email"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Jurisdiction</label><select class="form-select"><option>Trinidad and Tobago</option><option>Jamaica</option><option>Barbados</option><option>OECS Member States</option><option>Other (specify)</option></select></div>
      <div class="form-group"><label class="form-label">Estimated Credential Volume</label><select class="form-select"><option>Under 1,000 / year</option><option>1,000 &ndash; 10,000 / year</option><option>10,000 &ndash; 100,000 / year</option><option>Over 100,000 / year</option></select></div>
    </div>
    <div class="form-group"><label class="form-label">What credentials will you issue?</label><textarea class="form-input" rows="3" placeholder="Describe the types of credentials your organization plans to issue (e.g., birth certificates, vaccination records, professional licenses)..."></textarea></div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.5rem">
      <button class="btn btn-secondary btn-sm" onclick="showToast('Saved','Draft saved successfully.')">Save Draft</button>
      <button class="btn btn-primary btn-sm" hx-get="/portal/admin/guided-schema" hx-target="#main-content" hx-push-url="true">Next: Define Schema &rarr;</button>
    </div>
  </div>
</div>

<script>
function activateStep(el) {
  var steps = el.parentElement.querySelectorAll('.wizard-step');
  var clickedIdx = Array.from(steps).indexOf(el);
  steps.forEach(function(s, i) {
    s.classList.remove('active', 'done');
    if (i < clickedIdx) s.classList.add('done');
    if (i === clickedIdx) s.classList.add('active');
  });
}
</script>
{{end}}
