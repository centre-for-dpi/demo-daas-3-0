{{define "content"}}
<div class="page" style="display:block;padding:2rem 2rem 4rem;max-width:1100px;animation:pageIn 0.3s ease-out">
  <div class="page-header"><h1>Schema Wizard</h1><p>What information does your credential contain? Select the fields that apply.</p></div>
  <div class="card" style="margin-bottom:1.5rem">
    <div id="wizard-fields" style="display:flex;flex-direction:column;gap:0.75rem">
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">Full Name</div><div style="font-size:0.75rem;color:var(--text-secondary)">The credential holder's full legal name</div></div>
        <span class="tag">Text</span>
      </label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">Date of Birth</div><div style="font-size:0.75rem;color:var(--text-secondary)">Used for identity verification</div></div>
        <span class="tag">Date</span>
      </label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">Certificate Type</div><div style="font-size:0.75rem;color:var(--text-secondary)">The type or category of credential being issued</div></div>
        <span class="tag">Text</span>
      </label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" checked style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">Issue Date</div><div style="font-size:0.75rem;color:var(--text-secondary)">When the credential was officially issued</div></div>
        <span class="tag">Date</span>
      </label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">Expiry Date</div><div style="font-size:0.75rem;color:var(--text-secondary)">Optional expiration date for time-limited credentials</div></div>
        <span class="tag">Date</span>
      </label>
      <label style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border-radius:var(--radius-md);cursor:pointer">
        <input type="checkbox" style="accent-color:var(--accent);width:1.1rem;height:1.1rem">
        <div style="flex:1"><div style="font-weight:500;font-size:0.88rem">National ID Number</div><div style="font-size:0.75rem;color:var(--text-secondary)">Government-issued identification number</div></div>
        <span class="tag">Text</span>
      </label>
    </div>
    <div style="margin-top:1rem">
      <button class="btn btn-secondary btn-sm" onclick="addWizardField()">+ Add custom field</button>
    </div>
  </div>
  <div class="card">
    <div class="form-row" style="margin-bottom:0">
      <div class="form-group"><label class="form-label">Credential Standard</label><select class="form-select"><option>W3C-VCDM 2.0</option><option>W3C-VCDM 1.1</option><option>SD-JWT</option><option>mDL (ISO 18013-5)</option><option>AnonCreds</option></select></div>
      <div class="form-group"><label class="form-label">Schema Name</label><input class="form-input" placeholder="health-cert-v1" value="health-cert-v1"></div>
    </div>
  </div>
  <div style="display:flex;gap:0.5rem;justify-content:space-between;margin-top:1.5rem">
    <button class="btn btn-secondary btn-sm" hx-get="/portal/admin/intake" hx-target="#main-content" hx-push-url="true">&larr; Back</button>
    <button class="btn btn-primary btn-sm" hx-get="/portal/admin/preview-gen" hx-target="#main-content" hx-push-url="true">Next: Preview &rarr;</button>
  </div>
</div>

<script>
function addWizardField() {
  var container = document.getElementById('wizard-fields');
  var row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--bg-surface-alt);border:1px solid var(--accent);border-radius:var(--radius-md)';
  row.innerHTML =
    '<input type="checkbox" checked style="accent-color:var(--accent);width:1.1rem;height:1.1rem">' +
    '<input class="form-input" style="flex:1;padding:0.35rem 0.6rem;font-size:0.82rem" placeholder="Field name">' +
    '<select class="form-select" style="width:100px;padding:0.35rem 0.5rem;font-size:0.78rem"><option>Text</option><option>Date</option><option>Number</option><option>Boolean</option></select>' +
    '<button class="btn btn-ghost btn-sm" style="font-size:0.7rem;color:var(--error)" onclick="this.closest(\'div\').remove();showToast(\'Removed\',\'Custom field removed.\')">&#10005;</button>';
  container.appendChild(row);
  row.querySelector('input[type=text],input.form-input').focus();
  showToast('Custom Field', 'Enter the field name and select a type.');
}
</script>
{{end}}
