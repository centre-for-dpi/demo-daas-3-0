{{define "chatbot"}}
<button type="button" class="chatbot-trigger" id="chatbot-trigger" onclick="toggleChatbot()" title="Open assistant">&#128172;</button>
<div class="chatbot-backdrop" id="chatbot-backdrop" onclick="collapseChatbot()"></div>
<div class="chatbot-panel" id="chatbot-panel">
  <div class="chatbot-header">
    <div class="chatbot-header-info">
      <div class="chatbot-avatar">VC</div>
      <div class="chatbot-header-text">
        <h3>VC Assistant</h3>
        <p>Explore &middot; Decide &middot; Generate</p>
      </div>
    </div>
    <div class="chatbot-header-actions">
      <button type="button" class="panel-expand" id="chatbot-expand" onclick="toggleExpandChatbot()" title="Expand to full screen" aria-label="Expand to full screen">&#9727;</button>
      <button type="button" class="panel-close" onclick="toggleChatbot()" title="Close" aria-label="Close">&#10005;</button>
    </div>
  </div>
  <div class="chatbot-messages" id="chat-messages">
    <div class="chat-msg bot">
      <div class="chat-msg-body">
        Welcome. I can help you understand verifiable credentials, explore the platform, or generate documents for your team. What brings you here today?
      </div>
      <div class="chat-suggestions">
        <button type="button" class="chat-suggestion" onclick="sendSuggestion(this)">What is a DaaS scope document?</button>
        <button type="button" class="chat-suggestion" onclick="sendSuggestion(this)">What is a verifiable credential?</button>
        <button type="button" class="chat-suggestion" onclick="sendSuggestion(this)">Help me choose a tier</button>
        <button type="button" class="chat-suggestion" onclick="sendSuggestion(this)">Draft a pitch deck</button>
        <button type="button" class="chat-suggestion" onclick="sendSuggestion(this)">Technical advisory note</button>
      </div>
    </div>
  </div>
  <div class="chatbot-input">
    <input type="text" id="chat-input" placeholder="Ask anything..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat();}">
    <button type="button" class="chat-send" onclick="sendChat()">&#8594;</button>
  </div>
</div>

<script>
(function() {
  // Conversation state persists for the lifetime of the open panel.
  // Closing the panel resets both, so reopening starts a fresh conversation.
  var conversationId = null;
  var conversationHistory = [];  // [{role: 'user'|'assistant', content: '...'}]
  var lastBotPersona = null;     // most recent assistant persona — used by the router for stickiness

  // Persist chat state in sessionStorage so a page refresh within the same
  // tab keeps the conversation and the rendered messages. Cleared on panel
  // close and automatically cleared when the browser tab closes.
  var SS_KEY = 'cdpi.chatbot.state.v1';
  function saveState() {
    try {
      sessionStorage.setItem(SS_KEY, JSON.stringify({
        conversationId: conversationId,
        conversationHistory: conversationHistory,
        lastBotPersona: lastBotPersona
      }));
    } catch (e) { /* non-fatal: quota or disabled */ }
  }
  function clearState() {
    try { sessionStorage.removeItem(SS_KEY); } catch (e) {}
  }
  function loadState() {
    try {
      var raw = sessionStorage.getItem(SS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }

  // Cross-tab signal: when the chatbot saves an artifact, broadcast it so the
  // Outputs page (if open in another tab) can refresh its list without polling.
  var artifactChannel = null;
  try {
    if (typeof BroadcastChannel !== 'undefined') {
      artifactChannel = new BroadcastChannel('cdpi-agent-outputs');
    }
  } catch (e) { /* older browsers: feature skipped */ }

  function updateExpandButton(isExpanded) {
    var btn = document.getElementById('chatbot-expand');
    if (!btn) return;
    if (isExpanded) {
      btn.innerHTML = '&#9726;';
      btn.title = 'Collapse to widget';
      btn.setAttribute('aria-label', 'Collapse to widget');
    } else {
      btn.innerHTML = '&#9727;';
      btn.title = 'Expand to full screen';
      btn.setAttribute('aria-label', 'Expand to full screen');
    }
  }

  window.toggleChatbot = function() {
    var panel = document.getElementById('chatbot-panel');
    var trigger = document.getElementById('chatbot-trigger');
    var backdrop = document.getElementById('chatbot-backdrop');
    var willOpen = !panel.classList.contains('open');
    panel.classList.toggle('open');
    if (!willOpen) {
      // Closing — reset to widget state so next open starts small AND fresh.
      panel.classList.remove('expanded');
      backdrop.classList.remove('active');
      updateExpandButton(false);
      conversationId = null;
      conversationHistory = [];
      lastBotPersona = null;
      clearState();
      // Clear rendered messages back to the welcome bubble (the first child).
      var container = document.getElementById('chat-messages');
      if (container) {
        while (container.children.length > 1) {
          container.removeChild(container.lastChild);
        }
      }
    }
    trigger.style.display = panel.classList.contains('open') ? 'none' : 'flex';
  };

  window.openChatbot = function() {
    var panel = document.getElementById('chatbot-panel');
    var trigger = document.getElementById('chatbot-trigger');
    panel.classList.add('open');
    trigger.style.display = 'none';
  };

  window.toggleExpandChatbot = function() {
    var panel = document.getElementById('chatbot-panel');
    var backdrop = document.getElementById('chatbot-backdrop');
    var willExpand = !panel.classList.contains('expanded');
    panel.classList.toggle('expanded');
    backdrop.classList.toggle('active', willExpand);
    updateExpandButton(willExpand);
    var messages = document.getElementById('chat-messages');
    if (messages) messages.scrollTop = messages.scrollHeight;
  };

  window.collapseChatbot = function() {
    // Clicking the backdrop collapses from expanded -> widget (does not close).
    var panel = document.getElementById('chatbot-panel');
    var backdrop = document.getElementById('chatbot-backdrop');
    panel.classList.remove('expanded');
    backdrop.classList.remove('active');
    updateExpandButton(false);
  };

  window.sendChat = function() {
    var input = document.getElementById('chat-input');
    var text = (input.value || '').trim();
    if (!text) return;
    input.value = '';
    dispatchMessage(text);
  };

  window.sendSuggestion = function(btn) {
    var text = (btn.textContent || '').trim();
    if (!text) return;
    dispatchMessage(text);
  };

  function dispatchMessage(text) {
    addUserMessage(text);
    setInputDisabled(true);
    var typingId = addTypingIndicator();

    var ctx = {
      currentPath: window.location.pathname,
      currentTitle: document.title
    };
    var body = {
      message: text,
      context: ctx,
      history: conversationHistory.slice(),  // prior turns only; current message goes in `message`
      lastPersona: lastBotPersona             // router stickiness hint
    };
    if (conversationId) body.conversationId = conversationId;

    fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
      .then(function(r) {
        return r.json().then(function(j) { return { ok: r.ok, body: j }; });
      })
      .then(function(res) {
        removeTypingIndicator(typingId);
        if (!res.ok || res.body.error) {
          addBotMessage(null, res.body.error || 'Something went wrong talking to the agent. Try again in a moment.');
          return;
        }
        if (res.body.conversationId) conversationId = res.body.conversationId;
        if (res.body.persona) lastBotPersona = res.body.persona;
        var answer = res.body.answer || '(empty response)';
        var lastMsg = addBotMessage(res.body.persona, answer);
        // Persist this turn into history for the next call.
        conversationHistory.push({ role: 'user', content: text });
        conversationHistory.push({ role: 'assistant', content: answer });
        saveState();
        // Auto-save architect/programs replies as Outputs. Supports:
        //   - Single-document replies (deck OR note OR blog) — whole content
        //   - Content-pack replies — split on <!-- CDPI-ARTIFACT-BREAK --> and
        //     save each block as a separate artifact (e.g. blog + deck together)
        // Each block must pass looksLikeDocument on its own.
        var p = res.body.persona;
        if ((p === 'architect' || p === 'programs') && answer.length > 400) {
          var blocks = answer.split(/\n?<!--\s*CDPI-ARTIFACT-BREAK\s*-->\n?/i);
          blocks.forEach(function(block) {
            var trimmed = (block || '').trim();
            if (!trimmed || trimmed.length < 400) return;
            if (!looksLikeDocument(trimmed)) return;
            fetch('/api/agent/outputs', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ persona: p, content: trimmed, source: text })
            })
              .then(function(r) { return r.json(); })
              .then(function(saved) {
                if (saved && saved.id && lastMsg) {
                  attachSavedBadge(lastMsg, saved);
                  try {
                    window.dispatchEvent(new CustomEvent('cdpi:artifact-saved', { detail: { id: saved.id, artifact: saved } }));
                  } catch (e) {}
                  if (artifactChannel) {
                    try { artifactChannel.postMessage({ type: 'artifact-saved', id: saved.id }); } catch (e) {}
                  }
                }
              })
              .catch(function() { /* non-fatal */ });
          });
        }
      })
      .catch(function(err) {
        removeTypingIndicator(typingId);
        addBotMessage(null, 'Network error: ' + (err && err.message ? err.message : 'unknown'));
      })
      .finally(function() {
        setInputDisabled(false);
        document.getElementById('chat-input').focus();
      });
  }

  function addUserMessage(text) {
    var container = document.getElementById('chat-messages');
    var msg = document.createElement('div');
    msg.className = 'chat-msg user';
    var body = document.createElement('div');
    body.className = 'chat-msg-body';
    body.textContent = text;
    msg.appendChild(body);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function addBotMessage(persona, text) {
    var container = document.getElementById('chat-messages');
    var msg = document.createElement('div');
    msg.className = 'chat-msg bot';
    if (persona) {
      var badge = document.createElement('div');
      badge.className = 'chat-persona-badge chat-persona-' + persona;
      badge.textContent = personaLabel(persona);
      msg.appendChild(badge);
    }
    var body = document.createElement('div');
    body.className = 'chat-msg-body';
    body.innerHTML = mdToHtml(text);
    msg.appendChild(body);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return msg;
  }

  // looksLikeDocument returns true if the assistant's reply (or a block of it)
  // is structured like a real artifact (Marp deck, advisory note, blog post)
  // rather than a conversational meta reply.
  function looksLikeDocument(text) {
    if (!text) return false;
    var trimmed = text.replace(/^\s+/, '');
    var head = trimmed.slice(0, 400).toLowerCase();
    if (head.indexOf('---\nmarp: true') === 0) return true;  // Marp deck
    if (head.indexOf('---\r\nmarp: true') === 0) return true;
    if (/^#\s+\S/.test(head)) return true;                    // H1 first line (advisory note, blog post)
    if (/^##\s+ask\b/.test(head)) return true;                // advisory-note template
    return false;
  }

  function attachSavedBadge(msgEl, saved) {
    // Passive notification only — no link, no button, no navigation.
    var badge = document.createElement('div');
    badge.className = 'chat-saved-badge';
    var typeLabel = (function(t) {
      if (t === 'pitch_deck') return 'Pitch Deck';
      if (t === 'advisory_note') return 'Advisory Note';
      if (t === 'technical_scope') return 'Technical Scope';
      if (t === 'country_proposal') return 'Country Proposal';
      if (t === 'blog_post') return 'Blog Post';
      return 'Output';
    })(saved.type);
    badge.textContent = '✓ Saved as ' + typeLabel + ' · view and download from the Outputs tab';
    msgEl.appendChild(badge);
    var container = document.getElementById('chat-messages');
    container.scrollTop = container.scrollHeight;
  }

  function addTypingIndicator() {
    var container = document.getElementById('chat-messages');
    var id = 'typing-' + Date.now();
    var msg = document.createElement('div');
    msg.className = 'chat-msg bot typing';
    msg.id = id;
    var body = document.createElement('div');
    body.className = 'chat-msg-body';
    body.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    msg.appendChild(body);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTypingIndicator(id) {
    var el = document.getElementById(id);
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function setInputDisabled(disabled) {
    document.getElementById('chat-input').disabled = disabled;
    document.querySelector('.chat-send').disabled = disabled;
  }

  function personaLabel(p) {
    if (p === 'architect') return 'Technical Architect';
    if (p === 'programs') return 'Programs & Operations';
    if (p === 'guide') return 'Platform Guide';
    return p;
  }

  // Minimal Markdown → HTML converter. Handles the subset Claude emits:
  // headings, bold/italic/code, bullet lists, horizontal rules, paragraphs.
  // Does not render tables; they rarely appear in chat-mode replies.
  function mdToHtml(text) {
    if (!text) return '';
    // Strip a leading persona prefix like "**[GUIDE]**" since we already
    // render the badge separately.
    text = text.replace(/^\*\*\[[^\]]+\]\*\*\s*/, '');
    var esc = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    var lines = esc.split('\n');
    var out = [];
    var para = [];
    var inList = false;
    function flushPara() {
      if (para.length > 0) {
        out.push('<p>' + para.join(' ') + '</p>');
        para = [];
      }
    }
    function flushList() {
      if (inList) { out.push('</ul>'); inList = false; }
    }
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var trimmed = line.trim();
      if (!trimmed) { flushPara(); flushList(); continue; }
      if (trimmed === '---' || trimmed === '***') {
        flushPara(); flushList();
        out.push('<hr>');
        continue;
      }
      var headMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
      if (headMatch) {
        flushPara(); flushList();
        var level = Math.min(headMatch[1].length + 2, 6); // h3..h6 inside chat
        out.push('<h' + level + '>' + headMatch[2] + '</h' + level + '>');
        continue;
      }
      if (/^([-*+]|\d+\.)\s+/.test(trimmed)) {
        flushPara();
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push('<li>' + trimmed.replace(/^([-*+]|\d+\.)\s+/, '') + '</li>');
        continue;
      }
      flushList();
      para.push(trimmed);
    }
    flushPara();
    flushList();
    var html = out.join('\n');
    html = html.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    return html;
  }

  // ---- Boot: restore saved chat state from sessionStorage ----
  function restoreChatState() {
    var state = loadState();
    if (!state || !Array.isArray(state.conversationHistory) || state.conversationHistory.length === 0) return;

    conversationId = state.conversationId || null;
    lastBotPersona = state.lastBotPersona || null;
    conversationHistory = state.conversationHistory;

    // Re-render the messages into the panel so the user sees their prior turns.
    // Keep the existing welcome message (first .chat-msg child).
    for (var i = 0; i < conversationHistory.length; i++) {
      var turn = conversationHistory[i];
      if (!turn || !turn.content) continue;
      if (turn.role === 'user') {
        addUserMessage(turn.content);
      } else if (turn.role === 'assistant') {
        addBotMessage(lastBotPersona || 'guide', turn.content);
      }
    }
  }
  restoreChatState();
})();
</script>
{{end}}
