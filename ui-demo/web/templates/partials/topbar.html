{{define "topbar"}}
<header class="topbar">
  <div class="topbar-left">
    <div id="breadcrumb" class="topbar-breadcrumb">
      {{range .Breadcrumb}}
        {{if .Active}}<strong>{{.Label}}</strong>{{else}}{{.Label}} / {{end}}
      {{end}}
    </div>
  </div>
  <div class="topbar-right">
    {{if and .User .User.Demo}}
    <span class="tag tag-warning" style="font-size:0.65rem">DEMO &mdash; SAMPLE DATA</span>
    {{else if and .User (not .User.Demo)}}
    <span class="tag tag-accent" style="font-size:0.65rem">LIVE</span>
    {{end}}
    <button class="topbar-notif" hx-get="/portal/notifications" hx-target="#main-content" hx-push-url="true" title="Notifications">
      &#128276;
      {{if and .User .User.Demo}}<span class="notif-badge">4</span>{{end}}
    </button>
    <select class="lang-select" id="lang-select" onchange="switchLanguage(this.value)" title="Language" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.2rem 0.4rem;font-size:0.72rem;color:var(--text-secondary);cursor:pointer;outline:none">
      <option value="EN">EN</option>
      <option value="ES">ES</option>
      <option value="FR">FR</option>
      <option value="PT-BR">PT</option>
      <option value="HI">HI</option>
      <option value="SW">SW</option>
    </select>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9684;</button>
    {{if .User}}
    <div style="position:relative">
      <button class="topbar-user" id="user-menu-trigger" onclick="toggleUserMenu()">
        <div class="user-avatar">{{.User.Initials}}</div>
        <div>
          <div class="user-name">{{.User.Name}}</div>
          <div class="user-role">{{.User.Role}}</div>
        </div>
      </button>
      <div class="user-menu" id="user-menu">
        <button class="user-menu-item" hx-get="/portal/profile" hx-target="#main-content" hx-push-url="true" onclick="document.getElementById('user-menu').classList.remove('open')">&#128100; My Profile</button>
        {{if roleIs .User.Role "admin"}}
        <button class="user-menu-item" hx-get="/portal/notif-config" hx-target="#main-content" hx-push-url="true" onclick="document.getElementById('user-menu').classList.remove('open')">&#9881; Settings</button>
        {{end}}
        <div style="border-top:1px solid var(--border);margin:0.25rem 0"></div>
        <a class="user-menu-item" href="/logout" style="color:var(--error)">&#8617; Sign out</a>
      </div>
    </div>
    {{end}}
  </div>
</header>
{{end}}
