{{define "body"}}
<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="container nav-inner">
    <a class="nav-brand" href="/">{{.Config.Brand.NameBefore}}<span>{{.Config.Brand.NameAccent}}</span>{{.Config.Brand.NameAfter}}</a>
    <div class="nav-links">
      <a class="nav-link {{activeNav .ActivePage "home"}}" href="/">Home</a>
      <a class="nav-link {{activeNav .ActivePage "explainer"}}" href="/explainer">Learn</a>
      <a class="nav-link {{activeNav .ActivePage "mockup"}}" href="/mockup">Explore</a>
      <a class="nav-link {{activeNav .ActivePage "tiers"}}" href="/tiers">Packages</a>
      <a class="nav-link {{activeNav .ActivePage "roles"}}" href="/roles">Portal</a>
      <a class="nav-link {{activeNav .ActivePage "auditor"}}" href="/auditor">Audit</a>
      <a class="nav-link {{activeNav .ActivePage "agent-output"}}" href="/agent-output">Outputs</a>
      <select class="lang-select" id="lang-select" onchange="switchLanguage(this.value)" title="Language" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.2rem 0.4rem;font-size:0.72rem;color:var(--text-secondary);cursor:pointer;outline:none">
        <option value="EN">EN</option>
        <option value="ES">ES</option>
        <option value="FR">FR</option>
      </select>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">&#9684;</button>
    </div>
  </div>
</nav>
<main id="main-content" role="main">
  {{block "content" .}}{{end}}
</main>
{{if .Config.Features.Chatbot}}
{{template "chatbot" .}}
{{end}}
{{end}}
