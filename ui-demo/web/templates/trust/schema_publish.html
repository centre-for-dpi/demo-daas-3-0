{{define "content"}}
<div class="page" style="display:block;padding:2rem 2rem 4rem;max-width:1100px;animation:pageIn 0.3s ease-out">
  <div class="page-header"><h1>Publish Schema</h1><p>Define and publish a new credential schema to the registry.</p></div>

  <div class="card">
    <div class="form-group">
      <label class="form-label">Schema Name</label>
      <input type="text" class="form-input" placeholder="e.g. bsc-degree-v3">
    </div>
    <div class="form-group">
      <label class="form-label">Version</label>
      <input type="text" class="form-input" placeholder="e.g. 1.0.0">
    </div>
    <div class="form-group">
      <label class="form-label">Standard</label>
      <select class="form-input">
        <option>W3C-VCDM 2.0</option>
        <option>SD-JWT</option>
        <option>mDL</option>
        <option>JSON-LD</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Visibility</label>
      <select class="form-input">
        <option>Public</option>
        <option>Unlisted</option>
        <option>Private</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">JSON-LD Schema Definition</label>
      <textarea class="form-input" rows="12" style="font-family:monospace;font-size:0.82rem">{
  "@context": [
    "https://www.w3.org/2018/credentials/v1",
    "https://schemas.example.com/education/v2"
  ],
  "type": "CredentialSchema",
  "name": "BSc Degree v3",
  "properties": {
    "name": { "type": "string" },
    "degree": { "type": "string" },
    "major": { "type": "string" },
    "graduationDate": { "type": "date" },
    "gpa": { "type": "number" }
  },
  "required": ["name", "degree", "graduationDate"]
}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Well-Known URL</label>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <input type="text" class="form-input" readonly value="https://schemas.example.com/.well-known/bsc-degree-v3/1.0.0" style="flex:1;color:var(--text-secondary)">
        <button class="btn btn-sm btn-ghost" onclick="navigator.clipboard.writeText('https://schemas.example.com/.well-known/bsc-degree-v3/1.0.0');showToast('Copied','URL copied to clipboard.')">Copy</button>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1.5rem">
    <button class="btn btn-secondary btn-sm" onclick="showToast('Saved','Schema saved as draft.')">Save Draft</button>
    <button class="btn btn-primary btn-sm" hx-get="/portal/trust/schemas" hx-target="#main-content" hx-push-url="true" onclick="showToast('Published','Schema published to registry.')">Publish</button>
  </div>
</div>
{{end}}
