name: cdpi-agents

networks:
  cdpi-agents:
    name: cdpi-agents
    driver: bridge

volumes:
  qdrant_data:
  embeddings_data:

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: cdpi-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cdpi-agents

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: cdpi-embeddings
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - embeddings_data:/data
    command: ["--model-id", "BAAI/bge-small-en-v1.5"]
    networks:
      - cdpi-agents

  ingest:
    build: ./ingest
    image: cdpi-ingest:latest
    container_name: cdpi-ingest
    environment:
      EMBED_PROVIDER: ${EMBED_PROVIDER:-tei}
      EMBED_URL: ${EMBED_URL:-http://embeddings:80/v1/embeddings}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      VOYAGE_MODEL: ${VOYAGE_MODEL:-voyage-3.5}
      QDRANT_URL: http://qdrant:6333
      CORPUS_DIR: /corpus
      COLLECTION_NAME: ${COLLECTION_NAME:-cdpi_corpus}
    volumes:
      - ../references:/corpus:ro
    networks:
      - cdpi-agents
    depends_on:
      - qdrant
    # Only runs on explicit request: docker compose --profile ingest run --rm ingest
    profiles: ["ingest"]
